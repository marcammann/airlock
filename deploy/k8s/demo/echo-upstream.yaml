apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-upstream
  namespace: demo
  labels:
    app.kubernetes.io/name: echo-upstream
    app.kubernetes.io/part-of: airlock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: echo-upstream
  template:
    metadata:
      labels:
        app.kubernetes.io/name: echo-upstream
        app.kubernetes.io/part-of: airlock
    spec:
      containers:
        - name: echo
          image: registry.k8s.io/e2e-test-images/agnhost:2.45
          args:
            - netexec
            - --http-port=8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: echo-upstream
  namespace: demo
  labels:
    app.kubernetes.io/name: echo-upstream
    app.kubernetes.io/part-of: airlock
spec:
  selector:
    app.kubernetes.io/name: echo-upstream
  ports:
    - name: http
      port: 8080
      targetPort: http


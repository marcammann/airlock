apiVersion: v1
kind: ServiceAccount
metadata:
  name: code-agent
  namespace: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-agent
  namespace: demo
  labels:
    app.kubernetes.io/name: code-agent
    app.kubernetes.io/part-of: airlock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-agent
        app.kubernetes.io/part-of: airlock
        airlock.dev/proxy-worker: "true"
    spec:
      serviceAccountName: code-agent
      containers:
        - name: app
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - sleep infinity
        - name: envoy
          image: envoyproxy/envoy:v1.31.0
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - info
          ports:
            - name: envoy-http
              containerPort: 10000
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy
              readOnly: true
        - name: proxy-worker
          image: airlock-proxy-worker:dev
          imagePullPolicy: IfNotPresent
          args:
            - --proxy
            - http:envoy@127.0.0.1:50051
            - --control-plane-url
            - https://airlock-control-plane.airlock-system.svc.cluster.local:8443
            - --control-plane-auth
            - spiffe
            - --control-plane-server-id
            - spiffe://airlock.local/ns/airlock-system/sa/airlock-control-plane
            - --workload-identity
            - spiffe://airlock.local/ns/demo/sa/code-agent/component/airlock-proxy-worker
            - --spiffe-socket
            - unix:///run/spire/agent-sockets/spire-agent.sock
          ports:
            - name: ext-proc
              containerPort: 50051
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/agent-sockets
              readOnly: true
      volumes:
        - name: envoy-config
          configMap:
            name: code-agent-envoy
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/agent-sockets
            type: Directory

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: secretproviderconfigs.airlock.dev
spec:
  group: airlock.dev
  scope: Namespaced
  names:
    plural: secretproviderconfigs
    singular: secretproviderconfig
    kind: SecretProviderConfig
    shortNames:
      - spc
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required: ["spec"]
          properties:
            spec:
              type: object
              required: ["provider", "vault"]
              properties:
                provider:
                  type: string
                  enum: ["vault"]
                vault:
                  type: object
                  required: ["address", "auth"]
                  properties:
                    address:
                      type: string
                    auth:
                      type: object
                      required: ["method", "mount", "audience"]
                      properties:
                        method:
                          type: string
                          enum: ["spiffe-jwt"]
                        mount:
                          type: string
                        audience:
                          type: string
                    defaults:
                      type: object
                      properties:
                        engine:
                          type: string
                          enum: ["kv-v2"]
                        mount:
                          type: string

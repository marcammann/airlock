apiVersion: v1
kind: ServiceAccount
metadata:
  name: airlock-control-plane
  namespace: airlock-system
  labels:
    app.kubernetes.io/name: airlock-control-plane
    app.kubernetes.io/part-of: airlock
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airlock-control-plane
  namespace: airlock-system
  labels:
    app.kubernetes.io/name: airlock-control-plane
    app.kubernetes.io/part-of: airlock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: airlock-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: airlock-control-plane
        app.kubernetes.io/part-of: airlock
    spec:
      serviceAccountName: airlock-control-plane
      containers:
        - name: control-plane
          image: airlock-control-plane:dev
          imagePullPolicy: IfNotPresent
          args:
            - --listen=:8443
            - --health-listen=:8080
            - --worker-auth=spiffe
            - --admin-auth=spiffe
            - --spiffe-socket=unix:///run/spire/agent-sockets/spire-agent.sock
            - --spiffe-trust-domain=airlock.local
            - --kube-source
            - --kube-namespace=airlock-system
            - --spire-reconcile
            - --spire-garbage-collect=true
            - --spire-proxy-pod-label=airlock.dev/proxy-worker
            - --spire-proxy-pod-value=true
            - --vault-reconcile
            - --webhook-listen=:9443
            - --webhook-cert-file=/etc/airlock-webhook/tls.crt
            - --webhook-key-file=/etc/airlock-webhook/tls.key
          env:
            - name: AIRLOCK_VAULT_ADMIN_TOKEN
              value: root
          ports:
            - name: http
              containerPort: 8080
            - name: https
              containerPort: 8443
            - name: webhook
              containerPort: 9443
          volumeMounts:
            - name: spire-agent-socket
              mountPath: /run/spire/agent-sockets
              readOnly: true
            - name: webhook-tls
              mountPath: /etc/airlock-webhook
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: spire-agent-socket
          hostPath:
            path: /run/spire/agent-sockets
            type: Directory
        - name: webhook-tls
          secret:
            secretName: airlock-control-plane-webhook-tls
---
apiVersion: v1
kind: Service
metadata:
  name: airlock-control-plane
  namespace: airlock-system
  labels:
    app.kubernetes.io/name: airlock-control-plane
    app.kubernetes.io/part-of: airlock
spec:
  selector:
    app.kubernetes.io/name: airlock-control-plane
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: https
      port: 8443
      targetPort: https
    - name: webhook
      port: 9443
      targetPort: webhook

apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: airlock-sidecar-injector
  labels:
    app.kubernetes.io/name: airlock-control-plane
    app.kubernetes.io/part-of: airlock
webhooks:
  - name: sidecar-injector.airlock.dev
    admissionReviewVersions: ["v1"]
    sideEffects: None
    failurePolicy: Fail
    matchPolicy: Equivalent
    namespaceSelector:
      matchLabels:
        airlock.dev/injection: enabled
    objectSelector:
      matchLabels:
        airlock.dev/enabled: "true"
    rules:
      - operations: ["CREATE"]
        apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        scope: Namespaced
    clientConfig:
      service:
        name: airlock-control-plane
        namespace: airlock-system
        path: /mutate/v1/pods
        port: 9443
      caBundle: 

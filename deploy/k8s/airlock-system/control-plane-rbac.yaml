apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: airlock-control-plane
  labels:
    app.kubernetes.io/name: airlock-control-plane
    app.kubernetes.io/part-of: airlock
rules:
  - apiGroups: ["airlock.dev"]
    resources: ["airlockpolicies", "airlockworkloads", "secretproviderconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["airlock.dev"]
    resources: ["airlockworkloads/status"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["spire.spiffe.io"]
    resources: ["clusterspiffeids"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: airlock-control-plane
  labels:
    app.kubernetes.io/name: airlock-control-plane
    app.kubernetes.io/part-of: airlock
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: airlock-control-plane
subjects:
  - kind: ServiceAccount
    name: airlock-control-plane
    namespace: airlock-system

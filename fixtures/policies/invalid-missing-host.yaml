apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: missing-host
spec:
  egress:
    - name: openai-api
      scheme: https
      rewrites:
        - target: header
          name: Authorization
          valueTemplate: "Bearer {{secret}}"
          valueFrom:
            provider: env
            name: test-token
            env: AIRLOCK_TEST_TOKEN

apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: openai-api
  namespace: airlock-system
spec:
  egress:
    - name: openai-api
      scheme: https
      host: api.example.test
      port: 443
      rewrites:
        - target: header
          name: Authorization
          valueTemplate: "Bearer {{secret}}"
          valueFrom:
            provider: env
            name: test-token
            env: AIRLOCK_TEST_TOKEN

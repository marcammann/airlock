apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: unknown-provider
spec:
  egress:
    - name: openai-api
      scheme: https
      host: api.example.test
      rewrites:
        - target: header
          name: Authorization
          valueTemplate: "Bearer {{secret}}"
          valueFrom:
            provider: aws-secrets-manager
            name: test-token

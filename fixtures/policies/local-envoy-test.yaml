apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: local-envoy-test
  namespace: airlock-system
spec:
  egress:
    - name: local-envoy-upstream
      scheme: http
      host: 127.0.0.1
      port: 19081
      rewrites:
        - target: header
          name: Authorization
          valueTemplate: "Bearer {{secret}}"
          valueFrom:
            provider: env
            name: local-token
            env: AIRLOCK_TEST_TOKEN

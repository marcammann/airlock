apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: wildcard-secret-path
spec:
  egress:
    - name: openai-api
      scheme: https
      host: api.example.test
      rewrites:
        - target: header
          name: Authorization
          valueTemplate: "Bearer {{secret}}"
          valueFrom:
            provider: vault
            mount: secret
            engine: kv-v2
            path: airlock/openai/*
            key: api_key

apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: codex-openai-api
spec:
  workload:
    spiffeId: spiffe://airlock.local/compose/codex/component/airlock-proxy-worker
    namespace: compose
    serviceAccount: codex-app-server
  egress:
    - name: openai-api
      scheme: https
      host: api.openai.com
      port: 443
    - name: codex-chatgpt
      scheme: https
      host: chatgpt.com
      port: 443
    - name: openai-files
      scheme: https
      host: files.openai.com
      port: 443
    - name: openai-auth
      scheme: https
      host: auth.openai.com
      port: 443

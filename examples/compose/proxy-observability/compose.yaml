services:
  control-plane:
    build:
      context: ../../..
      dockerfile: control-plane/Dockerfile
    command:
      - --listen=:8080
      - --admin-listen=:8081
      - --policy=/airlock/policies/proxy-observability.yaml
      - --workload=/airlock/workloads/proxy-observability-workload.yaml
      - --worker-auth=dev-token
      - --worker-dev-token=${AIRLOCK_WORKER_TOKEN:-compose-worker-token}
      - --admin-auth=dev-token
      - --admin-dev-token=${AIRLOCK_ADMIN_TOKEN:-compose-admin-token}
      - --insecure-dev-mode
      - --heartbeat-stale-threshold=${AIRLOCK_HEARTBEAT_STALE_THRESHOLD:-3}
    ports:
      - "18100:8080"
      - "18101:8081"
    volumes:
      - ./policy/proxy-observability.yaml:/airlock/policies/proxy-observability.yaml:ro
      - ./policy/proxy-observability-workload.yaml:/airlock/workloads/proxy-observability-workload.yaml:ro

  proxy-worker:
    build:
      context: ../../..
      dockerfile: proxy-worker/Dockerfile
    depends_on:
      - control-plane
    restart: unless-stopped
    command:
      - --proxy
      - http:builtin@0.0.0.0:18080
      - --control-plane-url
      - http://control-plane:8080
      - --control-plane-auth
      - dev-token
      - --dev-token
      - ${AIRLOCK_WORKER_TOKEN:-compose-worker-token}
      - --insecure-dev-mode
      - --workload-identity
      - spiffe://airlock.local/compose/proxy-observability/component/airlock-proxy-worker
      - --heartbeat-interval
      - ${AIRLOCK_HEARTBEAT_INTERVAL:-2s}
    ports:
      - "18180:18080"

  proxy-worker-denied:
    build:
      context: ../../..
      dockerfile: proxy-worker/Dockerfile
    depends_on:
      - control-plane
    restart: unless-stopped
    command:
      - --proxy
      - http:builtin@0.0.0.0:18080
      - --control-plane-url
      - http://control-plane:8080
      - --control-plane-auth
      - dev-token
      - --dev-token
      - ${AIRLOCK_WORKER_TOKEN:-compose-worker-token}
      - --insecure-dev-mode
      - --workload-identity
      - spiffe://airlock.local/compose/proxy-observability/component/airlock-proxy-worker
      - --heartbeat-interval
      - ${AIRLOCK_HEARTBEAT_INTERVAL:-2s}
    ports:
      - "18181:18080"

  # web-ui:
  #   build:
  #     context: ../../../web-ui
  #     dockerfile: Dockerfile
  #   depends_on:
  #     - control-plane
  #   environment:
  #     AIRLOCK_CONTROL_PLANE_URL: http://control-plane:8081
  #     AIRLOCK_CONTROL_PLANE_TOKEN: ${AIRLOCK_ADMIN_TOKEN:-compose-admin-token}
  #     AIRLOCK_WEB_AUTH_MODE: dev
  #     AIRLOCK_WEB_DEV_ROLES: admin
  #     AIRLOCK_WEB_COOKIE_SECURE: "false"
  #   ports:
  #     - "13000:3000"

  client:
    image: curlimages/curl:8.11.1
    depends_on:
      - proxy-worker
    command:
      - sh
      - -c
      - |
        while true; do
          date
          curl -fsS http://example.com/ >/dev/null || true
          sleep 10
        done
    environment:
      HTTP_PROXY: http://proxy-worker:18080
      HTTPS_PROXY: http://proxy-worker:18080
      NO_PROXY: 127.0.0.1,localhost
      http_proxy: http://proxy-worker:18080
      https_proxy: http://proxy-worker:18080
      no_proxy: 127.0.0.1,localhost

  client-denied:
    image: curlimages/curl:8.11.1
    depends_on:
      - proxy-worker-denied
    command:
      - sh
      - -c
      - |
        while true; do
          date
          curl -fsS http://iana.org/ >/dev/null || true
          sleep 10
        done
    environment:
      HTTP_PROXY: http://proxy-worker-denied:18080
      HTTPS_PROXY: http://proxy-worker-denied:18080
      NO_PROXY: 127.0.0.1,localhost
      http_proxy: http://proxy-worker-denied:18080
      https_proxy: http://proxy-worker-denied:18080
      no_proxy: 127.0.0.1,localhost

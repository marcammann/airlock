services:
  airlock-proxy:
    build:
      context: ../../..
      dockerfile: proxy-worker/Dockerfile
    command:
      - --proxy
      - http:builtin@0.0.0.0:18080
      - --no-control-plane
      - --policy
      - /airlock/policies/openai-api.yaml
    volumes:
      - ./policy/openai-api.yaml:/airlock/policies/openai-api.yaml:ro

  opencode-server:
    build:
      context: ../../..
      dockerfile: examples/compose/opencode-headless/Dockerfile.server
    depends_on:
      - airlock-proxy
    working_dir: /workspace
    command:
      - serve
      - --hostname
      - 0.0.0.0
      - --port
      - "4096"
    ports:
      - "127.0.0.1:${OPENCODE_PORT:-4096}:4096"
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-opencode-local}
      OPENCODE_CONFIG: /etc/opencode/opencode.json
      HTTP_PROXY: http://airlock-proxy:18080
      HTTPS_PROXY: http://airlock-proxy:18080
      http_proxy: http://airlock-proxy:18080
      https_proxy: http://airlock-proxy:18080
      NO_PROXY: localhost,127.0.0.1,::1
      no_proxy: localhost,127.0.0.1,::1
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GOOGLE_GENERATIVE_AI_API_KEY: ${GOOGLE_GENERATIVE_AI_API_KEY:-}
    volumes:
      - ../../..:/workspace
      - ./config/opencode.json:/etc/opencode/opencode.json:ro
      - opencode-data:/root/.local/share/opencode
      - opencode-config:/root/.config/opencode

volumes:
  opencode-data:
  opencode-config:

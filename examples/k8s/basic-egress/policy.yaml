apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: echo-upstream
  namespace: airlock-system
spec:
  egress:
    - name: echo-upstream
      scheme: http
      host: echo-upstream.demo.svc.cluster.local
      port: 8080
      rewrites:
        - target: header
          name: Authorization
          valueTemplate: "Bearer {{secret}}"
          valueFrom:
            provider: vault
            name: test-token
            path: airlock/openai/code-agent
            key: api_key

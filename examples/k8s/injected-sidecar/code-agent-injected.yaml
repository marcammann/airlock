apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-agent-injected
  namespace: demo
  labels:
    app.kubernetes.io/name: code-agent-injected
    app.kubernetes.io/part-of: airlock
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-agent-injected
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-agent-injected
        app.kubernetes.io/part-of: airlock
        airlock.dev/enabled: "true"
      annotations:
        airlock.dev/enabled: "true"
        airlock.dev/workload: code-agent
    spec:
      serviceAccountName: code-agent
      containers:
        - name: app
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - sleep infinity

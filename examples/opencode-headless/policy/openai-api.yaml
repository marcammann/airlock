apiVersion: airlock.dev/v1alpha1
kind: AirlockPolicy
metadata:
  name: opencode-openai-api
spec:
  workload:
    spiffeId: spiffe://airlock.local/compose/opencode/component/airlock-proxy-worker
    namespace: compose
    serviceAccount: opencode-server
  egress:
    - name: openai-api
      scheme: https
      host: api.openai.com
      port: 443
